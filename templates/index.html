<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쥬쥬핑 월드 (scrap)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5eedc;
      color: #3e2f1c;
      min-height: 100vh;
    }
    .header {
      background: #5c4033;
      padding: 14px 0;
      text-align: center;
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; color: #f5eedc; }
    .container { max-width: 520px; margin: 20px auto; padding: 0 16px; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #7a6a52;
      margin-bottom: 4px;
    }
    .input-row { display: flex; gap: 5px; align-items: center; }
    .input-row input { flex: 1; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d5c9a8;
      border-radius: 5px;
      font-size: 0.85rem;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #d4a017; }
    input[readonly] {
      background: #efe8d6;
      color: #6b5c43;
      cursor: default;
    }
    input[readonly]:focus { border-color: #d5c9a8; }
    input.editing {
      background: #fff !important;
      color: #3e2f1c !important;
      border-color: #c9952a !important;
    }
    .btn-edit {
      padding: 7px 12px;
      border: 1px solid #d5c9a8;
      border-radius: 5px;
      background: #efe8d6;
      cursor: pointer;
      font-size: 0.78rem;
      color: #8a6d1b;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-edit:hover { background: #e6dcc4; }
    .btn-edit.active { background: #c9952a; color: #fff; border-color: #c9952a; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    .keywords-box {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px;
      border: 1px solid #d5c9a8;
      border-radius: 5px;
      min-height: 36px;
      background: #faf6ec;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      background: #e8dcc0;
      color: #5c4033;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .chip .remove {
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      opacity: 0.5;
    }
    .chip .remove:hover { opacity: 1; }
    .add-keyword { display: inline-flex; align-items: center; }
    .add-keyword input {
      width: 80px;
      padding: 3px 7px;
      border: 1px dashed #c5b896;
      border-radius: 12px;
      font-size: 0.78rem;
      background: #fff;
    }
    .btn-search {
      width: 100%;
      padding: 10px;
      background: #5c4033;
      color: #f5eedc;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-search:hover { background: #4a3328; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-area {
      display: none;
      text-align: center;
      padding: 16px 0;
    }
    .progress-area.show { display: block; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #d5c9a8;
      border-top-color: #5c4033;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text {
      font-size: 0.85rem;
      color: #7a6a52;
      animation: fadeInOut 0.5s ease;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .progress-detail { font-size: 0.78rem; color: #a89878; margin-top: 4px; }
    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: #e0d6c0;
      border-radius: 3px;
      margin: 10px 0 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #5c4033;
      border-radius: 3px;
      width: 0%;
      transition: width 0.6s ease;
    }
    .progress-pct {
      font-size: 0.78rem;
      color: #5c4033;
      font-weight: 700;
    }
    .result-area {
      display: none;
      text-align: center;
      padding: 14px 0;
    }
    .result-area.show { display: block; }
    .result-count {
      font-size: 1rem;
      font-weight: 700;
      color: #3e2f1c;
      margin-bottom: 10px;
    }
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 20px;
      background: #5c4033;
      color: #f5eedc;
      border: none;
      border-radius: 5px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-download:hover { background: #4a3328; }
    .error-text { color: #c0392b; font-weight: 600; font-size: 0.85rem; }
    .btn-retry {
      margin-top: 8px;
      padding: 6px 16px;
      background: #fff;
      color: #5c4033;
      border: 1px solid #5c4033;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-retry:hover { background: #efe8d6; }
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #a89878;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>쥬쥬핑 월드 (scrap)</h1>
  </div>

  <div class="container">
    <div class="field">
      <label>기준 주소</label>
      <div class="input-row">
        <input type="text" id="address" value="{{ default_address }}" readonly>
        <button class="btn-edit" id="btn-addr-edit" onclick="toggleAddressEdit()">수정</button>
      </div>
    </div>

    <div class="row">
      <div class="field" style="flex:0 0 120px">
        <label>반경 (km)</label>
        <input type="number" id="radius" value="{{ default_radius }}" min="1" max="100">
      </div>
      <div class="field" style="flex:0 0 120px">
        <label>최대 결과 수</label>
        <input type="number" id="max_results" value="500" min="1" max="5000">
      </div>
      <div class="field" style="flex:1"></div>
    </div>

    <div class="field">
      <label>검색 키워드</label>
      <div class="keywords-box" id="keywords-box">
        {% for kw in keywords %}
        <span class="chip" data-kw="{{ kw }}">
          {{ kw }}
          <span class="remove" onclick="removeKeyword(this)">&times;</span>
        </span>
        {% endfor %}
        <span class="add-keyword">
          <input type="text" id="new-keyword" placeholder="+ 추가" onkeydown="addKeyword(event)">
        </span>
      </div>
    </div>

    <button class="btn-search" id="btn-search" onclick="startSearch()">검색 시작</button>

    <div class="progress-area" id="progress-area">
      <div class="spinner"></div>
      <div class="progress-text" id="progress-text">검색 준비 중...</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0%</div>
      <div class="progress-detail" id="progress-detail"></div>
    </div>

    <div class="result-area" id="result-area"></div>
  </div>

  <div class="footer">쥬쥬핑 월드 &copy; 2026</div>

  <script>
    let currentTaskId = null;
    let pollTimer = null;
    let statusTimer = null;
    const statusMessages = ['검색 중...', '스크랩 중...', '상세주소 검색 중...', '데이터 수집 중...'];
    let statusIdx = 0;

    function toggleAddressEdit() {
      const input = document.getElementById('address');
      const btn = document.getElementById('btn-addr-edit');
      if (input.readOnly) {
        input.readOnly = false;
        input.classList.add('editing');
        input.focus();
        btn.textContent = '확인';
        btn.classList.add('active');
      } else {
        input.readOnly = true;
        input.classList.remove('editing');
        btn.textContent = '수정';
        btn.classList.remove('active');
      }
    }

    function removeKeyword(el) {
      el.parentElement.remove();
    }

    function addKeyword(e) {
      if (e.key !== 'Enter') return;
      const input = e.target;
      const kw = input.value.trim();
      if (!kw) return;

      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.dataset.kw = kw;
      chip.innerHTML = kw + ' <span class="remove" onclick="removeKeyword(this)">&times;</span>';

      const addSpan = document.querySelector('.add-keyword');
      addSpan.parentElement.insertBefore(chip, addSpan);
      input.value = '';
    }

    function getKeywords() {
      return Array.from(document.querySelectorAll('.chip')).map(c => c.dataset.kw);
    }

    async function startSearch() {
      const address = document.getElementById('address').value.trim();
      const radius = document.getElementById('radius').value;
      const maxResults = document.getElementById('max_results').value;
      const keywords = getKeywords();

      if (!address) { alert('주소를 입력해주세요.'); return; }
      if (keywords.length === 0) { alert('키워드를 1개 이상 입력해주세요.'); return; }

      document.getElementById('btn-search').disabled = true;
      document.getElementById('progress-area').classList.add('show');
      document.getElementById('result-area').classList.remove('show');
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('progress-detail').textContent = '';
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-pct').textContent = '0%';
      statusIdx = 0;
      updateStatusText();
      statusTimer = setInterval(updateStatusText, 2500);

      try {
        const resp = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, radius, max_results: maxResults, keywords }),
        });
        const data = await resp.json();
        currentTaskId = data.task_id;
        pollStatus();
      } catch (err) {
        showError('서버 연결 실패: ' + err.message);
      }
    }

    function updateStatusText() {
      const el = document.getElementById('progress-text');
      el.textContent = statusMessages[statusIdx % statusMessages.length];
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
      statusIdx++;
    }

    function stopStatusRotation() {
      if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
    }

    function pollStatus() {
      if (!currentTaskId) return;
      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch('/api/status/' + currentTaskId);
          const data = await resp.json();
          document.getElementById('progress-detail').textContent = data.progress;
          const pct = data.percent || 0;
          document.getElementById('progress-bar').style.width = pct + '%';
          document.getElementById('progress-pct').textContent = pct + '%';
          if (data.status === 'done') {
            clearInterval(pollTimer);
            stopStatusRotation();
            document.getElementById('progress-area').classList.remove('show');
            showResult(data.count);
          } else if (data.status === 'error') {
            clearInterval(pollTimer);
            stopStatusRotation();
            document.getElementById('progress-area').classList.remove('show');
            showError(data.progress);
          }
        } catch (err) {}
      }, 1500);
    }

    function showResult(count) {
      const area = document.getElementById('result-area');
      area.classList.add('show');
      area.innerHTML = `
        <div class="result-count">${count}개 학원 검색 완료</div>
        <a class="btn-download" href="/api/download/${currentTaskId}">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          엑셀 다운로드
        </a>
        <br><br>
        <button class="btn-retry" onclick="resetSearch()">새 검색</button>
      `;
      document.getElementById('btn-search').disabled = false;
    }

    function showError(msg) {
      const area = document.getElementById('result-area');
      area.classList.add('show');
      area.innerHTML = `
        <div class="error-text">${msg}</div>
        <button class="btn-retry" onclick="resetSearch()">다시 시도</button>
      `;
      document.getElementById('btn-search').disabled = false;
    }

    function resetSearch() {
      document.getElementById('result-area').classList.remove('show');
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('btn-search').disabled = false;
      currentTaskId = null;
    }
  </script>
</body>
</html>
