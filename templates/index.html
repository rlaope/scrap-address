<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쥬쥬핑 월드 (scrap)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 28px 0 24px;
      text-align: center;
    }
    .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .header p { margin-top: 6px; font-size: 0.9rem; opacity: 0.85; }
    .container { max-width: 680px; margin: -20px auto 40px; padding: 0 16px; }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-row input { flex: 1; }
    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
      background: white;
    }
    input:focus { border-color: #667eea; }
    input[readonly] {
      background: #f7f7fa;
      color: #555;
      cursor: default;
    }
    input[readonly]:focus { border-color: #ddd; }
    input.editing {
      background: white !important;
      color: #1a1a2e !important;
      border-color: #667eea !important;
    }
    .btn-edit {
      padding: 10px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      background: #f7f7fa;
      cursor: pointer;
      font-size: 0.85rem;
      color: #667eea;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-edit:hover { background: #eef0ff; border-color: #667eea; }
    .btn-edit.active { background: #667eea; color: white; border-color: #667eea; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .keywords-box {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      min-height: 48px;
      background: #fafafa;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #eef0ff;
      color: #4a5ad8;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .chip .remove {
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .chip .remove:hover { opacity: 1; }
    .add-keyword {
      display: inline-flex;
      align-items: center;
    }
    .add-keyword input {
      width: 100px;
      padding: 6px 10px;
      border: 1.5px dashed #ccc;
      border-radius: 20px;
      font-size: 0.85rem;
      background: white;
    }
    .btn-search {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-search:hover { opacity: 0.92; }
    .btn-search:active { transform: scale(0.98); }
    .btn-search:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .progress-area {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .progress-area.show { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #eee;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text {
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
    }
    .result-area {
      display: none;
      text-align: center;
      padding: 16px 0;
    }
    .result-area.show { display: block; }
    .result-count {
      font-size: 1.3rem;
      font-weight: 700;
      color: #4a5ad8;
      margin-bottom: 12px;
    }
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .btn-download:hover { opacity: 0.9; }
    .error-text { color: #ef4444; font-weight: 600; font-size: 0.95rem; }
    .btn-retry {
      margin-top: 12px;
      padding: 10px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>쥬쥬핑 월드 (scrap)</h1>
    <p>어린이 체육 학원 검색기</p>
  </div>

  <div class="container">
    <div class="card">
      <!-- Address -->
      <div class="field">
        <label>기준 주소</label>
        <div class="input-row">
          <input type="text" id="address" value="{{ default_address }}" readonly>
          <button class="btn-edit" id="btn-addr-edit" onclick="toggleAddressEdit()">수정</button>
        </div>
      </div>

      <!-- Radius + Max -->
      <div class="row">
        <div class="field">
          <label>검색 반경 (km)</label>
          <input type="number" id="radius" value="{{ default_radius }}" min="1" max="100">
        </div>
        <div class="field">
          <label>최대 결과 수</label>
          <input type="number" id="max_results" value="500" min="1" max="5000">
        </div>
      </div>

      <!-- Keywords -->
      <div class="field">
        <label>검색 키워드</label>
        <div class="keywords-box" id="keywords-box">
          {% for kw in keywords %}
          <span class="chip" data-kw="{{ kw }}">
            {{ kw }}
            <span class="remove" onclick="removeKeyword(this)">&times;</span>
          </span>
          {% endfor %}
          <span class="add-keyword">
            <input type="text" id="new-keyword" placeholder="+ 추가" onkeydown="addKeyword(event)">
          </span>
        </div>
      </div>

      <!-- Search Button -->
      <button class="btn-search" id="btn-search" onclick="startSearch()">검색 시작</button>

      <!-- Progress -->
      <div class="progress-area" id="progress-area">
        <div class="spinner"></div>
        <div class="progress-text" id="progress-text">시작 중...</div>
      </div>

      <!-- Result -->
      <div class="result-area" id="result-area"></div>
    </div>
  </div>

  <div class="footer">쥬쥬핑 월드 &copy; 2026</div>

  <script>
    let currentTaskId = null;
    let pollTimer = null;

    function toggleAddressEdit() {
      const input = document.getElementById('address');
      const btn = document.getElementById('btn-addr-edit');
      if (input.readOnly) {
        input.readOnly = false;
        input.classList.add('editing');
        input.focus();
        btn.textContent = '확인';
        btn.classList.add('active');
      } else {
        input.readOnly = true;
        input.classList.remove('editing');
        btn.textContent = '수정';
        btn.classList.remove('active');
      }
    }

    function removeKeyword(el) {
      el.parentElement.remove();
    }

    function addKeyword(e) {
      if (e.key !== 'Enter') return;
      const input = e.target;
      const kw = input.value.trim();
      if (!kw) return;

      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.dataset.kw = kw;
      chip.innerHTML = kw + ' <span class="remove" onclick="removeKeyword(this)">&times;</span>';

      const addSpan = document.querySelector('.add-keyword');
      addSpan.parentElement.insertBefore(chip, addSpan);
      input.value = '';
    }

    function getKeywords() {
      return Array.from(document.querySelectorAll('.chip')).map(c => c.dataset.kw);
    }

    async function startSearch() {
      const address = document.getElementById('address').value.trim();
      const radius = document.getElementById('radius').value;
      const maxResults = document.getElementById('max_results').value;
      const keywords = getKeywords();

      if (!address) { alert('주소를 입력해주세요.'); return; }
      if (keywords.length === 0) { alert('키워드를 1개 이상 입력해주세요.'); return; }

      // UI state
      document.getElementById('btn-search').disabled = true;
      document.getElementById('progress-area').classList.add('show');
      document.getElementById('result-area').classList.remove('show');
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('progress-text').textContent = '시작 중...';

      try {
        const resp = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, radius, max_results: maxResults, keywords }),
        });
        const data = await resp.json();
        currentTaskId = data.task_id;
        pollStatus();
      } catch (err) {
        showError('서버 연결 실패: ' + err.message);
      }
    }

    function pollStatus() {
      if (!currentTaskId) return;
      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch('/api/status/' + currentTaskId);
          const data = await resp.json();

          document.getElementById('progress-text').textContent = data.progress;

          if (data.status === 'done') {
            clearInterval(pollTimer);
            document.getElementById('progress-area').classList.remove('show');
            showResult(data.count);
          } else if (data.status === 'error') {
            clearInterval(pollTimer);
            document.getElementById('progress-area').classList.remove('show');
            showError(data.progress);
          }
        } catch (err) {
          // ignore transient errors
        }
      }, 1500);
    }

    function showResult(count) {
      const area = document.getElementById('result-area');
      area.classList.add('show');
      area.innerHTML = `
        <div class="result-count">${count}개 학원 검색 완료</div>
        <a class="btn-download" href="/api/download/${currentTaskId}">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          엑셀 다운로드
        </a>
        <br><br>
        <button class="btn-retry" onclick="resetSearch()">새 검색</button>
      `;
      document.getElementById('btn-search').disabled = false;
    }

    function showError(msg) {
      const area = document.getElementById('result-area');
      area.classList.add('show');
      area.innerHTML = `
        <div class="error-text">${msg}</div>
        <button class="btn-retry" onclick="resetSearch()">다시 시도</button>
      `;
      document.getElementById('btn-search').disabled = false;
    }

    function resetSearch() {
      document.getElementById('result-area').classList.remove('show');
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('btn-search').disabled = false;
      currentTaskId = null;
    }
  </script>
</body>
</html>
